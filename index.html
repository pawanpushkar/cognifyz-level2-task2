<!DOCTYPE html>
<html>
<head>
    <title>Level 2 Task 2</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        nav {
            background-color: #333;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Menu */
        .menu {
            display: flex;
            gap: 20px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        .menu a:hover {
            color: yellow;
        }

        /* Hamburger */
        .hamburger {
            display: none;
            font-size: 25px;
            cursor: pointer;
        }

        /* Content */
        .container {
            padding: 20px;
        }

        /* 🔥 Responsive Design */
        @media (max-width: 768px) {

            .menu {
                display: none;
                flex-direction: column;
                width: 100%;
                background-color: #333;
                position: absolute;
                top: 60px;
                left: 0;
                text-align: center;
                padding: 10px 0;
            }

            .menu a {
                padding: 10px;
                display: block;
            }

            .menu.active {
                display: flex;
            }

            .hamburger {
                display: block;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav>
        <div>My Website</div>

        <span class="hamburger" onclick="toggleMenu()">☰</span>

        <div class="menu" id="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <!-- Content -->
    <div class="container">
        <h1>Responsive Webpage</h1>
        <p>This page adapts to different screen sizes using CSS media queries.</p>
    </div>

    <!-- JavaScript -->
    <script>
        function toggleMenu() {
            document.getElementById("menu").classList.toggle("active");
        }
    </script>

</body>
</html>
